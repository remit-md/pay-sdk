version: 2
updates:
  # TypeScript SDK — watch OWS peer dependency
  - package-ecosystem: "npm"
    directory: "/typescript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    allow:
      - dependency-name: "@open-wallet-standard/core"

  # OWS policy package
  - package-ecosystem: "npm"
    directory: "/ows-policy"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Python SDK — watch OWS optional dependency
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    allow:
      - dependency-name: "open-wallet-standard"
