name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Get current version
        id: current
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Update VERSION file
        run: echo "${{ steps.next.outputs.version }}" > VERSION

      - name: Update TypeScript package.json
        run: |
          cd typescript
          jq '.version = "${{ steps.next.outputs.version }}"' package.json > tmp.json && mv tmp.json package.json

      - name: Update Python pyproject.toml
        run: |
          sed -i 's/^version = .*/version = "${{ steps.next.outputs.version }}"/' python/pyproject.toml

      - name: Update TypeScript jsr.json
        run: |
          cd typescript
          jq '.version = "${{ steps.next.outputs.version }}"' jsr.json > tmp.json && mv tmp.json jsr.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION typescript/package.json typescript/jsr.json python/pyproject.toml
          git commit -m "release: v${{ steps.next.outputs.version }}"
          git tag "v${{ steps.next.outputs.version }}"
          git push origin main --tags
