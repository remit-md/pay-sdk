name: E2E Acceptance Tests

on:
  workflow_dispatch:
    inputs:
      provider_address:
        description: "Provider wallet address for test payments"
        required: false
        default: ""

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PAYSKILL_TESTNET_KEY: ${{ secrets.PAYSKILL_TESTNET_KEY }}
  PAYSKILL_TESTNET_URL: ${{ secrets.PAYSKILL_TESTNET_URL || 'https://testnet.pay-skill.com/api/v1' }}
  PAYSKILL_TESTNET_PROVIDER: ${{ github.event.inputs.provider_address }}

jobs:
  python-e2e:
    name: SDK Python E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: cd python && pip install -e ".[dev]"
      - name: Run E2E tests
        run: cd python && pytest tests/test_e2e.py -v --timeout=120

  typescript-e2e:
    name: SDK TypeScript E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: "latest"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Install
        run: cd typescript && pnpm install --frozen-lockfile
      - name: Run E2E tests
        run: cd typescript && node --import tsx --test tests/test_e2e.ts
