name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.1)"
        required: true

env:
  TAG: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python lint + test
        run: |
          cd python && pip install -e ".[dev]"
          ruff check .
          ruff format --check .
          pytest -v -m "not e2e"

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: TypeScript lint + test
        run: |
          cd typescript && pnpm install --frozen-lockfile
          pnpm tsc --noEmit
          pnpm test

  typescript:
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  python:
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  jsr:
    runs-on: ubuntu-latest
    needs: typescript
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to JSR
        run: npx jsr publish --allow-dirty

  release:
    runs-on: ubuntu-latest
    needs: [typescript, python]
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
