name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.1)"
        required: true

env:
  TAG: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Python lint + test (main SDK)
        run: |
          cd python && pip install -e ".[dev]"
          ruff check .
          ruff format --check .
          pytest -v -m "not e2e"

      - name: Python test (payskill-fastapi)
        run: |
          cd python/fastapi && pip install -e ".[dev]"
          ruff check .
          pytest -v

      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: TypeScript lint + test (main SDK)
        run: |
          cd typescript && pnpm install --frozen-lockfile
          pnpm tsc --noEmit
          pnpm test

      - name: TypeScript test (@pay-skill/express)
        run: |
          cd typescript/express && npm ci
          npm run typecheck
          npm run build
          npm test

      - name: TypeScript test (@pay-skill/next)
        run: |
          cd typescript/next && npm ci
          npm run typecheck
          npm run build
          npm test

  typescript:
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view "@pay-skill/sdk@$VERSION" version > /dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "@pay-skill/sdk@$VERSION already on npm — skipping publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "@pay-skill/sdk@$VERSION not yet published — will publish"
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  typescript-express:
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: typescript/express
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view "@pay-skill/express@$VERSION" version > /dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "@pay-skill/express@$VERSION already on npm — skipping publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "@pay-skill/express@$VERSION not yet published — will publish"
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  typescript-next:
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: typescript/next
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view "@pay-skill/next@$VERSION" version > /dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "@pay-skill/next@$VERSION already on npm — skipping publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "@pay-skill/next@$VERSION not yet published — will publish"
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  python:
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/pay-skill/$VERSION/json")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "pay-skill $VERSION already on PyPI — skipping publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "pay-skill $VERSION not yet published — will publish"
          fi

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  python-fastapi:
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: python/fastapi
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/payskill-fastapi/$VERSION/json")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "payskill-fastapi $VERSION already on PyPI — skipping publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "payskill-fastapi $VERSION not yet published — will publish"
          fi

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/fastapi/dist/

  jsr:
    runs-on: ubuntu-latest
    needs: typescript
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to JSR
        run: npx jsr publish --allow-dirty

  release:
    runs-on: ubuntu-latest
    needs:
      - typescript
      - typescript-express
      - typescript-next
      - python
      - python-fastapi
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
