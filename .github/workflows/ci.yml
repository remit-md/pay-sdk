name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: SDK Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: cd python && pip install -e ".[dev]"
      - name: Lint
        run: cd python && ruff check .
      - name: Format check
        run: cd python && ruff format --check .
      - name: Type check
        run: cd python && mypy src/
      - name: Test with coverage gate
        run: cd python && pytest -v --cov=payskill --cov-fail-under=40 --cov-report=term-missing

  typescript:
    name: SDK TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "latest"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Install
        run: cd typescript && pnpm install --frozen-lockfile
      - name: Typecheck
        run: cd typescript && pnpm tsc --noEmit
      - name: Build
        run: cd typescript && pnpm tsc
      - name: Test
        run: cd typescript && pnpm test
