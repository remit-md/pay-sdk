name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: SDK Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: cd python && pip install -e ".[dev]"
      - name: Lint
        run: cd python && ruff check .
      - name: Format check
        run: cd python && ruff format --check .
      - name: Type check
        run: cd python && mypy src/
      - name: Unit tests
        run: cd python && pytest -v --cov=payskill --cov-fail-under=40 --cov-report=term-missing -m "not e2e"
      - name: E2E tests (testnet)
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          PAYSKILL_TESTNET_KEY: ${{ secrets.PAYSKILL_TESTNET_KEY }}
          PAYSKILL_TESTNET_URL: http://204.168.133.111:3001/api/v1
        run: cd python && pytest -v -m "e2e" --timeout=60

  typescript:
    name: SDK TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: "latest"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Install
        run: cd typescript && pnpm install --frozen-lockfile
      - name: Typecheck
        run: cd typescript && pnpm tsc --noEmit
      - name: Build
        run: cd typescript && pnpm tsc
      - name: Unit tests
        run: cd typescript && pnpm test
      - name: E2E tests (testnet)
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          PAYSKILL_TESTNET_KEY: ${{ secrets.PAYSKILL_TESTNET_KEY }}
          PAYSKILL_TESTNET_URL: http://204.168.133.111:3001/api/v1
        run: cd typescript && node --import tsx --test tests/test_e2e.ts
